<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=none">
    <title>8 Flat Kinetic Spheres</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: crosshair; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w, h;
const balls = [];
let grabbedBall = null;

const mouse = { 
    x: 0, y: 0, 
    lastX: 0, lastY: 0, 
    vx: 0, vy: 0, 
    down: false 
};

// 8 Specific sizes with solid colors
const ballConfigs = [
    { r: 15, color: '#ff0055' }, 
    { r: 25, color: '#00ffcc' }, 
    { r: 35, color: '#00bfff' }, 
    { r: 45, color: '#ffcc00' }, 
    { r: 55, color: '#9d00ff' }, 
    { r: 65, color: '#ff5e00' }, 
    { r: 75, color: '#aaff00' }, 
    { r: 85, color: '#ffffff' }  
];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const getPos = (e) => {
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    return { x: clientX, y: clientY };
};

window.addEventListener('pointerdown', (e) => {
    const pos = getPos(e);
    mouse.x = mouse.lastX = pos.x;
    mouse.y = mouse.lastY = pos.y;
    mouse.down = true;

    for (let i = balls.length - 1; i >= 0; i--) {
        const ball = balls[i];
        const dx = pos.x - ball.x;
        const dy = pos.y - ball.y;
        if (Math.sqrt(dx*dx + dy*dy) < ball.r) {
            grabbedBall = ball;
            break; 
        }
    }
});

window.addEventListener('pointermove', (e) => {
    const pos = getPos(e);
    mouse.x = pos.x;
    mouse.y = pos.y;
    
    mouse.vx = mouse.x - mouse.lastX;
    mouse.vy = mouse.y - mouse.lastY;
    
    mouse.lastX = mouse.x;
    mouse.lastY = mouse.y;
});

window.addEventListener('pointerup', () => {
    if (grabbedBall) {
        grabbedBall.vx = mouse.vx;
        grabbedBall.vy = mouse.vy;
    }
    grabbedBall = null;
    mouse.down = false;
});

class Ball {
    constructor(config) {
        this.r = config.r;
        this.color = config.color;
        this.x = Math.random() * (w - this.r * 2) + this.r;
        this.y = Math.random() * (h - this.r * 2) + this.r;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
    }

    update() {
        if (grabbedBall === this) {
            this.x = mouse.x;
            this.y = mouse.y;
            this.vx = mouse.vx;
            this.vy = mouse.vy;
            if (this.vx > 15) { this.vx = 15 }
            if (this.vy > 15) { this.vy = 15 }
            if (this.vx < -15) { this.vx = 15 }
            if (this.vy < -15) { this.vy = 15 }
        } else {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x + this.r > w) { this.x = w - this.r; this.vx *= -1; }
            if (this.x - this.r < 0) { this.x = this.r; this.vx *= -1; }
            if (this.y + this.r > h) { this.y = h - this.r; this.vy *= -1; }
            if (this.y - this.r < 0) { this.y = this.r; this.vy *= -1; }

            // High Momentum
            this.vx *= 0.9995;
            this.vy *= 0.9995;
        }
    }

    draw() {
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.closePath();
    }
}

ballConfigs.forEach(conf => balls.push(new Ball(conf)));

function resolveCollisions() {
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            const b1 = balls[i];
            const b2 = balls[j];
            const dx = b2.x - b1.x;
            const dy = b2.y - b1.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDist = b1.r + b2.r;

            if (dist < minDist) {
                const angle = Math.atan2(dy, dx);
                const tx = b1.x + Math.cos(angle) * minDist;
                const ty = b1.y + Math.sin(angle) * minDist;
                const ax = (tx - b2.x) * 0.5;
                const ay = (ty - b2.y) * 0.5;

                if (b1 !== grabbedBall) { b1.vx -= ax; b1.vy -= ay; }
                if (b2 !== grabbedBall) { b2.vx += ax; b2.vy += ay; }
                
                const overlap = (minDist - dist) / 2;
                if (b1 !== grabbedBall) { b1.x -= Math.cos(angle) * overlap; b1.y -= Math.sin(angle) * overlap; }
                if (b2 !== grabbedBall) { b2.x += Math.cos(angle) * overlap; b2.y += Math.sin(angle) * overlap; }
            }
        }
    }
}

function loop() {
    ctx.clearRect(0, 0, w, h);
    resolveCollisions();
    balls.forEach(ball => {
        ball.update();
        ball.draw();
    });
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
