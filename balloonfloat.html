<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Balloon Float Pro</title>
    <style>
        :root {
            --bg-color: #1a253a; 
            --balloon-size: clamp(140px, 18vw, 200px);
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-area {
            position: relative;
            flex-grow: 1;
            width: 100vw;
            z-index: 5;
        }

        .balloon {
            position: absolute;
            width: var(--balloon-size);
            height: calc(var(--balloon-size) * 1.3);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer;
            box-shadow: inset -15px -15px 40px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.2);
            animation: rise 18s linear forwards; 
            z-index: 10;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 20px;
            background-color: inherit;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        @keyframes rise {
            from { top: 100vh; }
            to { top: -250px; }
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 2px; /* Square/Rectangle confetti */
            pointer-events: none;
            z-index: 20;
            animation: burst 2s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(360deg) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-area"></div>

    <script>
        const balloonColors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6', '#ff9f43'];
        const gameArea = document.getElementById('game-area');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let activeBalloons = 0;
        const maxBalloons = 3;

        function playChime(yPosition) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            
            // Calculate pitch based on height
            // Screen bottom (high Y) = Low Frequency (200Hz)
            // Screen top (low Y) = High Frequency (500Hz)
            const heightFactor = 1 - (yPosition / window.innerHeight);
            const frequency = 200 + (heightFactor * 300); 

            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime); 
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        function createBalloon() {
            if (activeBalloons >= maxBalloons) return;

            activeBalloons++;
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            
            const color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            balloon.style.backgroundColor = color;
            
            const randomX = 10 + Math.random() * 70; 
            balloon.style.left = `${randomX}vw`;
            
            const handleInteraction = (e) => {
                if (e.type === 'touchstart') e.preventDefault();
                const rect = balloon.getBoundingClientRect();
                handlePop(balloon, rect.top);
            };

            balloon.addEventListener('touchstart', handleInteraction, {passive: false});
            balloon.addEventListener('mousedown', handleInteraction);

            gameArea.appendChild(balloon);

            // If balloon finishes rising without being popped
            balloon.addEventListener('animationend', () => {
                if (balloon.parentNode) {
                    balloon.remove();
                    activeBalloons--;
                }
            });
        }

        function handlePop(balloon, yPos) {
            playChime(yPos);
            createBurst(balloon);
            balloon.remove();
            activeBalloons--;
        }

        function createBurst(balloon) {
            const rect = balloon.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Increased confetti count to 30
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                
                // MULTI-COLOR: Pick a random color from the library for each piece
                confetti.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 150;
                
                confetti.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                confetti.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                
                confetti.style.left = `${centerX}px`;
                confetti.style.top = `${centerY}px`;

                gameArea.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        // Spawn loop: Checks every 3 seconds if we need more balloons
        setInterval(() => {
            if (activeBalloons < maxBalloons) {
                createBalloon();
            }
        }, 3000);

        // Initial Start
        createBalloon();
    </script>
</body>
</html>
