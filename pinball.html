<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Pinball: Heavy Physics Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; color: #00bfff; font-family: 'Courier New', monospace; }
        #score { position: absolute; top: 20px; left: 20px; font-size: 2rem; text-shadow: 0 0 10px #00bfff; z-index: 10; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="score">000000</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;

const engine = Engine.create();
// High-fidelity physics settings to prevent "tunneling" (passing through walls)
engine.positionIterations = 20; 
engine.velocityIterations = 20;

const world = engine.world;
const w = window.innerWidth;
const h = window.innerHeight;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: w, height: h, wireframes: false, background: '#000' }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

let score = 0;
const wallAttr = { isStatic: true, render: { fillStyle: '#00bfff' }, restitution: 0.1 };

// --- CABINET REPAIRS ---
const leftWall = Bodies.rectangle(w * 0.2, h / 2, 40, h, wallAttr);
const rightWall = Bodies.rectangle(w * 0.8, h / 2, 40, h, wallAttr);
const topWall = Bodies.rectangle(w / 2, 50, w * 0.6, 40, wallAttr);

// Launch Tube: Lowered the left wall of the tube so it doesn't block the arch
const launcherWall = Bodies.rectangle(w * 0.74, h * 0.65, 20, h * 0.7, wallAttr);
const launcherBase = Bodies.rectangle(w * 0.77, h * 0.95, 60, 40, { isStatic: true, render: { fillStyle: '#ff0055' } });

// Thicker Arcs for better collision detection
function createThickArc(centerX, centerY, radius, startAngle, endAngle) {
    const segments = 30;
    const group = Composite.create();
    for (let i = 0; i <= segments; i++) {
        const angle = startAngle + (i / segments) * (endAngle - startAngle);
        const x = centerX + Math.cos(angle) * radius;
        const y = centerY + Math.sin(angle) * radius;
        const seg = Bodies.rectangle(x, y, 60, 60, { // Much thicker segments
            isStatic: true,
            angle: angle + Math.PI/2,
            render: { fillStyle: '#00bfff' }
        });
        Composite.add(group, seg);
    }
    return group;
}
const leftCorner = createThickArc(w * 0.2 + 100, 150, 100, Math.PI, Math.PI * 1.5);
const rightCorner = createThickArc(w * 0.8 - 100, 150, 100, Math.PI * 1.5, Math.PI * 2);

const leftSlant = Bodies.rectangle(w * 0.3, h * 0.8, 280, 40, { isStatic: true, angle: 0.5, render: { fillStyle: '#005577' } });
const rightSlant = Bodies.rectangle(w * 0.62, h * 0.8, 280, 40, { isStatic: true, angle: -0.5, render: { fillStyle: '#005577' } });
const drain = Bodies.rectangle(w / 2, h + 100, w, 100, { isStatic: true, isSensor: true, label: 'drain' });

const bumpers = [
    Bodies.circle(w * 0.4, h * 0.35, 35, { isStatic: true, label: 'bumper', render: { fillStyle: '#000', strokeStyle: '#00bfff', lineWidth: 5 }, restitution: 1.5 }),
    Bodies.circle(w * 0.6, h * 0.35, 35, { isStatic: true, label: 'bumper', render: { fillStyle: '#000', strokeStyle: '#00bfff', lineWidth: 5 }, restitution: 1.5 }),
];

// --- LONGER & ALIGNED FLIPPERS ---
function createFlipper(x, y, side) {
    const length = 150; // Increased length
    const pivotX = side === 'left' ? x - length/2 : x + length/2;
    
    const flipper = Bodies.rectangle(x, y, length, 30, {
        isStatic: true,
        render: { fillStyle: '#ff0055' },
        chamfer: { radius: 15 },
        label: side + 'Flipper'
    });

    return {
        body: flipper,
        pivot: { x: pivotX, y: y },
        side: side,
        angle: side === 'left' ? 0.4 : -0.4,
        maxAngle: side === 'left' ? -0.4 : 0.4,
        minAngle: side === 'left' ? 0.4 : -0.4,
        offset: length / 2
    };
}

// Right flipper moved from 0.6 to 0.58 to bring it further left
const leftFlip = createFlipper(w * 0.38, h * 0.88, 'left');
const rightFlip = createFlipper(w * 0.54, h * 0.88, 'right');

// --- THE BALL ---
let ball;
function spawnBall() {
    if(ball) Composite.remove(world, ball);
    ball = Bodies.circle(w * 0.77, h * 0.9, 15, { 
        restitution: 0.4, 
        friction: 0.0001,
        slop: 0, // Reduces "sinking" into walls
        label: 'ball', 
        render: { fillStyle: '#fff' } 
    });
    Composite.add(world, ball);
}

Composite.add(world, [
    leftWall, rightWall, topWall, launcherWall, launcherBase,
    leftCorner, rightCorner, leftSlant, rightSlant, drain, 
    ...bumpers, leftFlip.body, rightFlip.body
]);

spawnBall();

// --- CONTROLS & PHYSICS SYNC ---
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

Events.on(engine, 'beforeUpdate', () => {
    // Left Flipper Logic
    const lTarget = keys['ArrowLeft'] ? leftFlip.maxAngle : leftFlip.minAngle;
    leftFlip.angle += (lTarget - leftFlip.angle) * 0.4;
    Body.setAngle(leftFlip.body, leftFlip.angle);
    const lPos = Vector.rotate({ x: leftFlip.offset, y: 0 }, leftFlip.angle);
    Body.setPosition(leftFlip.body, { x: leftFlip.pivot.x + lPos.x, y: leftFlip.pivot.y + lPos.y });

    // Right Flipper Logic
    const rTarget = keys['ArrowRight'] ? rightFlip.maxAngle : rightFlip.minAngle;
    rightFlip.angle += (rTarget - rightFlip.angle) * 0.4;
    Body.setAngle(rightFlip.body, rightFlip.angle);
    const rPos = Vector.rotate({ x: -rightFlip.offset, y: 0 }, rightFlip.angle);
    Body.setPosition(rightFlip.body, { x: rightFlip.pivot.x + rPos.x, y: rightFlip.pivot.y + rPos.y });

    // Launcher (Tuned to 0.02)
    if (keys['Space'] && ball.position.x > w * 0.73) {
        Body.applyForce(ball, ball.position, { x: 0, y: -0.02 });
    }
});

Events.on(engine, 'collisionStart', (e) => {
    e.pairs.forEach(p => {
        if (p.bodyA.label === 'bumper' || p.bodyB.label === 'bumper') {
            score += 100;
            document.getElementById('score').innerText = score.toString().padStart(6, '0');
        }
        if (p.bodyA.label === 'drain' || p.bodyB.label === 'drain') {
            score = 0; spawnBall();
        }
    });
});
</script>
</body>
</html>
