<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vanilla Pinball: Clear Launch</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00bfff; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #hud { position: absolute; top: 20px; left: 20px; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="hud">SCORE: <span id="s">0</span><br><small>HOLD SPACE TO LAUNCH</small></div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('s');
let w, h, score = 0;

let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 14 };
let flipA = 0.5, flipB = -0.5;
const keys = {};

let lines = [];
let bumpers = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const m = w * 0.5, L = w * 0.2, R = w * 0.8;
    const laneW = 60; // Launch lane width
    
    // Core Table Walls
    lines = [
        {x1: L, y1: h, x2: L, y2: 200}, // Outer Left
        {x1: R, y1: h, x2: R, y2: 200}, // Outer Right
        {x1: R - laneW, y1: h, x2: R - laneW, y2: 300}, // Inner Launch Wall
        
        // The Exit Kickers (Sharp angles to force ball left)
        {x1: R, y1: 150, x2: R - laneW - 50, y2: 50}, // Ceiling redirector
        {x1: L, y1: h * 0.8, x2: m - 130, y2: h * 0.96}, // Left drain slant
        {x1: R - laneW, y1: h * 0.8, x2: m + 130, y2: h * 0.96} // Right drain slant
    ];

    // Smooth Top Arch
    for(let i = 0; i <= 20; i++) {
        let a1 = Math.PI + (i / 20) * Math.PI;
        let a2 = Math.PI + ((i + 1) / 20) * Math.PI;
        lines.push({
            x1: m + Math.cos(a1) * (m - L), y1: 200 + Math.sin(a1) * 150,
            x2: m + Math.cos(a2) * (m - L), y2: 200 + Math.sin(a2) * 150
        });
    }

    bumpers = [{x: m-80, y: 350, r: 40}, {x: m+80, y: 350, r: 40}, {x: m, y: 200, r: 50}];
    resetBall();
}

function resetBall() {
    ball.x = w * 0.8 - 30; // Centered in launch lane
    ball.y = h - 50;
    ball.vx = 0; ball.vy = 0;
}

window.onkeydown = e => keys[e.code] = 1;
window.onkeyup = e => keys[e.code] = 0;

function update() {
    // Flipper Logic
    flipA += (keys.ArrowLeft ? -0.6 : 0.3);
    flipB += (keys.ArrowRight ? 0.6 : -0.3);
    flipA = Math.max(-0.7, Math.min(0.4, flipA));
    flipB = Math.max(-0.4, Math.min(0.7, flipB));

    // High-Power Launcher
    if (keys.Space && ball.y > h - 100) {
        ball.vy -= 2.5; // Stronger initial thrust
    }

    // Physics
    ball.vy += 0.3; // Gravity
    ball.x += ball.vx;
    ball.y += ball.vy;
    
    // Slight air friction only when NOT in the launch tube
    if (ball.x < w * 0.7) {
        ball.vx *= 0.99; ball.vy *= 0.99;
    }

    const m = w * 0.5, fY = h * 0.96;
    const flippers = [
        {x: m - 130, y: fY, a: flipA, l: 120, side: -1},
        {x: m + 130, y: fY, a: Math.PI - flipB, l: 120, side: 1}
    ];

    // Collision Detection (Lines)
    lines.forEach(l => {
        let dx = l.x2 - l.x1, dy = l.y2 - l.y1;
        let lenSq = dx*dx + dy*dy;
        let dot = ((ball.x - l.x1) * dx + (ball.y - l.y1) * dy) / lenSq;
        let cx = l.x1 + Math.max(0, Math.min(1, dot)) * dx;
        let cy = l.y1 + Math.max(0, Math.min(1, dot)) * dy;
        let dist = Math.hypot(ball.x - cx, ball.y - cy);
        
        if (dist < ball.r) {
            let nx = (ball.x - cx) / dist, ny = (ball.y - cy) / dist;
            let vdot = ball.vx * nx + ball.vy * ny;
            // Bounce
            ball.vx = (ball.vx - 2 * vdot * nx) * 0.8;
            ball.vy = (ball.vy - 2 * vdot * ny) * 0.8;
            ball.x = cx + nx * ball.r;
            ball.y = cy + ny * ball.r;
        }
    });

    // Flipper Collisions
    flippers.forEach(f => {
        let fx2 = f.x + Math.cos(f.a) * f.l, fy2 = f.y + Math.sin(f.a) * f.l;
        let dx = fx2 - f.x, dy = fy2 - f.y;
        let dot = ((ball.x - f.x) * dx + (ball.y - f.y) * dy) / (dx*dx + dy*dy);
        let cx = f.x + Math.max(0, Math.min(1, dot)) * dx, cy = f.y + Math.max(0, Math.min(1, dot)) * dy;
        let dist = Math.hypot(ball.x - cx, ball.y - cy);
        
        if (dist < ball.r) {
            let isMoving = (f.side === -1 && keys.ArrowLeft) || (f.side === 1 && keys.ArrowRight);
            ball.vy = isMoving ? -18 : -6; // Massive kick if moving
            ball.vx += isMoving ? (f.side * -5) : 0;
            ball.y = cy - ball.r;
        }
    });

    // Bumper Collisions
    bumpers.forEach(b => {
        let dist = Math.hypot(ball.x - b.x, ball.y - b.y);
        if (dist < b.r + ball.r) {
            let nx = (ball.x - b.x) / dist, ny = (ball.y - b.y) / dist;
            ball.vx = nx * 12; ball.vy = ny * 12; // Explosive bounce
            score += 100; scoreEl.innerText = score;
        }
    });

    if (ball.y > h + 50) { resetBall(); score = 0; scoreEl.innerText = 0; }
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#00bfff'; ctx.lineWidth = 4;
    
    ctx.beginPath();
    lines.forEach(l => { ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); });
    ctx.stroke();

    bumpers.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.stroke();
    });

    const m = w * 0.5, fY = h * 0.96;
    [[m - 130, fY, flipA], [m + 130, fY, Math.PI - flipB]].forEach(f => {
        ctx.beginPath(); ctx.lineWidth = 14; ctx.strokeStyle = '#ff0055';
        ctx.moveTo(f[0], f[1]);
        ctx.lineTo(f[0] + Math.cos(f[2]) * 120, f[1] + Math.sin(f[2]) * 120);
        ctx.stroke();
    });

    ctx.fillStyle = '#fff'; ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, 7); ctx.fill();
    
    update();
    requestAnimationFrame(draw);
}

window.onresize = resize;
resize();
draw();
</script>
</body>
</html>
