<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinball: Fixed Physics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; color: #00bfff; font-family: 'Courier New', monospace; }
        #score { position: absolute; top: 20px; left: 20px; font-size: 2rem; text-shadow: 0 0 10px #00bfff; z-index: 10; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="score">000000</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;

const engine = Engine.create();
// Increase solver iterations to prevent the ball from going through walls
engine.positionIterations = 10;
engine.velocityIterations = 10;

const world = engine.world;
const w = window.innerWidth;
const h = window.innerHeight;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: w, height: h, wireframes: false, background: '#000' }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

let score = 0;
const wallAttr = { isStatic: true, render: { fillStyle: '#00bfff' }, restitution: 0.5 };

// --- BOUNDARIES ---
const leftWall = Bodies.rectangle(w * 0.2, h / 2, 40, h, wallAttr);
const rightWall = Bodies.rectangle(w * 0.8, h / 2, 40, h, wallAttr);
const topWall = Bodies.rectangle(w / 2, 50, w * 0.6, 40, wallAttr);
const launcherWall = Bodies.rectangle(w * 0.75, h * 0.6, 20, h * 0.8, wallAttr);
const launcherBase = Bodies.rectangle(w * 0.775, h * 0.95, 60, 40, { isStatic: true, render: { fillStyle: '#ff0055' } });

// Corrected Rounded Corners
function createArc(centerX, centerY, radius, startAngle, endAngle) {
    const segments = 20;
    const group = Composite.create();
    for (let i = 0; i <= segments; i++) {
        const angle = startAngle + (i / segments) * (endAngle - startAngle);
        const x = centerX + Math.cos(angle) * radius;
        const y = centerY + Math.sin(angle) * radius;
        const seg = Bodies.rectangle(x, y, 50, 30, {
            isStatic: true,
            angle: angle + Math.PI/2,
            render: { fillStyle: '#00bfff' }
        });
        Composite.add(group, seg);
    }
    return group;
}
const leftCorner = createArc(w * 0.2 + 100, 150, 100, Math.PI, Math.PI * 1.5);
const rightCorner = createArc(w * 0.8 - 100, 150, 100, Math.PI * 1.5, Math.PI * 2);

// Slants to guide ball to center
const leftSlant = Bodies.rectangle(w * 0.3, h * 0.8, 250, 30, { isStatic: true, angle: 0.5, render: { fillStyle: '#005577' } });
const rightSlant = Bodies.rectangle(w * 0.65, h * 0.8, 250, 30, { isStatic: true, angle: -0.5, render: { fillStyle: '#005577' } });
const drain = Bodies.rectangle(w / 2, h + 100, w, 100, { isStatic: true, isSensor: true, label: 'drain' });

const bumpers = [
    Bodies.circle(w * 0.4, h * 0.35, 30, { isStatic: true, label: 'bumper', render: { fillStyle: '#000', strokeStyle: '#00bfff', lineWidth: 5 }, restitution: 1.5 }),
    Bodies.circle(w * 0.6, h * 0.35, 30, { isStatic: true, label: 'bumper', render: { fillStyle: '#000', strokeStyle: '#00bfff', lineWidth: 5 }, restitution: 1.5 }),
    Bodies.circle(w * 0.5, h * 0.2, 35, { isStatic: true, label: 'bumper', render: { fillStyle: '#000', strokeStyle: '#ff0055', lineWidth: 5 }, restitution: 1.5 })
];

// --- KINEMATIC FLIPPERS (Will not fall off) ---
function createFlipper(x, y, side) {
    const length = 120;
    const pivotX = side === 'left' ? x - length/2 : x + length/2;
    
    const flipper = Bodies.rectangle(x, y, length, 25, {
        isStatic: true, // Static means it won't fall or react to gravity
        render: { fillStyle: '#ff0055' },
        chamfer: { radius: 12 },
        label: side + 'Flipper'
    });

    return {
        body: flipper,
        pivot: { x: pivotX, y: y },
        side: side,
        angle: side === 'left' ? 0.5 : -0.5,
        maxAngle: side === 'left' ? -0.5 : 0.5,
        minAngle: side === 'left' ? 0.5 : -0.5
    };
}

const leftFlip = createFlipper(w * 0.4, h * 0.88, 'left');
const rightFlip = createFlipper(w * 0.6, h * 0.88, 'right');

// --- BALL ---
let ball;
function spawnBall() {
    if(ball) Composite.remove(world, ball);
    ball = Bodies.circle(w * 0.775, h * 0.9, 14, { 
        restitution: 0.3, 
        friction: 0,
        frictionAir: 0.005,
        label: 'ball', 
        render: { fillStyle: '#fff' } 
    });
    Composite.add(world, ball);
}

Composite.add(world, [
    leftWall, rightWall, topWall, launcherWall, launcherBase,
    leftCorner, rightCorner, leftSlant, rightSlant, drain, 
    ...bumpers, leftFlip.body, rightFlip.body
]);

spawnBall();

// --- GAME LOOP ---
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

Events.on(engine, 'beforeUpdate', () => {
    // Control Left Flipper
    const lTarget = keys['ArrowLeft'] ? leftFlip.maxAngle : leftFlip.minAngle;
    leftFlip.angle += (lTarget - leftFlip.angle) * 0.35;
    Body.setAngle(leftFlip.body, leftFlip.angle);
    // Rotate around pivot
    const lOffset = Vector.rotate({ x: 60, y: 0 }, leftFlip.angle);
    Body.setPosition(leftFlip.body, { x: leftFlip.pivot.x + lOffset.x, y: leftFlip.pivot.y + lOffset.y });

    // Control Right Flipper
    const rTarget = keys['ArrowRight'] ? rightFlip.maxAngle : rightFlip.minAngle;
    rightFlip.angle += (rTarget - rightFlip.angle) * 0.35;
    Body.setAngle(rightFlip.body, rightFlip.angle);
    // Rotate around pivot
    const rOffset = Vector.rotate({ x: -60, y: 0 }, rightFlip.angle);
    Body.setPosition(rightFlip.body, { x: rightFlip.pivot.x + rOffset.x, y: rightFlip.pivot.y + rOffset.y });

    // Launcher
    if (keys['Space'] && ball.position.x > w * 0.75) {
        Body.applyForce(ball, ball.position, { x: 0, y: -0.018 });
    }
});

// Collision Scoring
Events.on(engine, 'collisionStart', (e) => {
    e.pairs.forEach(p => {
        if (p.bodyA.label === 'bumper' || p.bodyB.label === 'bumper') {
            score += 100;
            document.getElementById('score').innerText = score.toString().padStart(6, '0');
        }
        if (p.bodyA.label === 'drain' || p.bodyB.label === 'drain') {
            score = 0; spawnBall();
        }
    });
});
</script>
</body>
</html>
