<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Procedural Maze Runner</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { border: 4px solid #333; image-rendering: pixelated; background: #000; }
        .hud { margin-top: 10px; font-size: 1.5rem; text-align: center; }
        #level-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #0f0; display: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="level-banner">LEVEL 1</div>
    <canvas id="view"></canvas>
    <div class="hud">LEVEL: <span id="lvl-num">1</span> | FIND THE GOLD EXIT</div>

<script>
const canvas = document.getElementById('view');
const ctx = canvas.getContext('2d');
canvas.width = 640;
canvas.height = 400;

const texSize = 64;
const FOV = Math.PI / 3;
let currentLevel = 1;
let MAP = [];
let MAP_W, MAP_H;
let zBuffer = new Array(canvas.width);
let player = { x: 1.5, y: 1.5, dir: 0, rotSpeed: 0.05, moveSpeed: 0.08 };

// --- PROCEDURAL MAZE GENERATION (Recursive Backtracker) ---
function generateMaze(size) {
    MAP_W = size; MAP_H = size;
    let maze = Array.from({ length: size }, () => Array(size).fill(1));

    function walk(x, y) {
        maze[y][x] = 0;
        let dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);
        for (let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && maze[ny][nx] === 1) {
                maze[y + dy / 2][x + dx / 2] = 0;
                walk(nx, ny);
            }
        }
    }
    walk(1, 1);
    maze[1][1] = 0; // Start
    maze[size - 2][size - 2] = 3; // End Point (Gold)
    return maze;
}

// --- TEXTURES ---
const wallTex = document.createElement('canvas').getContext('2d');
wallTex.canvas.width = wallTex.canvas.height = texSize;
wallTex.fillStyle = "#222"; wallTex.fillRect(0,0,64,64);
wallTex.strokeStyle = "#0f0"; wallTex.lineWidth = 2;
wallTex.strokeRect(5, 5, 54, 54); // Cyber-grid walls

function initLevel() {
    const size = 11 + (currentLevel * 2); // Mazes get bigger
    MAP = generateMaze(size);
    player.x = 1.5; player.y = 1.5; player.dir = 0;
    document.getElementById('lvl-num').innerText = currentLevel;
    
    // Show banner
    const banner = document.getElementById('level-banner');
    banner.innerText = "LEVEL " + currentLevel;
    banner.style.display = "block";
    setTimeout(() => banner.style.display = "none", 2000);
}

// --- INPUT ---
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (keys['KeyA'] || keys['ArrowLeft']) player.dir -= player.rotSpeed;
    if (keys['KeyD'] || keys['ArrowRight']) player.dir += player.rotSpeed;
    
    let move = (keys['KeyW'] || keys['ArrowUp'] ? 1 : keys['KeyS'] || keys['ArrowDown'] ? -1 : 0) * player.moveSpeed;
    if (move !== 0) {
        let nx = player.x + Math.cos(player.dir) * move;
        let ny = player.y + Math.sin(player.dir) * move;
        
        let cell = MAP[Math.floor(ny)][Math.floor(nx)];
        if (cell === 0 || cell === 3) {
            player.x = nx; player.y = ny;
        }
        
        // Check for level completion
        if (cell === 3) {
            currentLevel++;
            initLevel();
        }
    }
}

function draw() {
    // Floor & Ceiling
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height/2);
    ctx.fillStyle = "#111"; ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

    for (let x = 0; x < canvas.width; x++) {
        let rayAngle = (player.dir - FOV / 2) + (x / canvas.width) * FOV;
        let dist = 0;
        let eyeX = Math.cos(rayAngle), eyeY = Math.sin(rayAngle);
        let hitEnd = false;

        while (dist < 30) {
            dist += 0.05;
            let tx = Math.floor(player.x + eyeX * dist);
            let ty = Math.floor(player.y + eyeY * dist);
            if (MAP[ty]?.[tx] === 1) break;
            if (MAP[ty]?.[tx] === 3) { hitEnd = true; break; }
        }

        let correctedDist = dist * Math.cos(rayAngle - player.dir);
        let h = canvas.height / correctedDist;

        if (hitEnd) {
            // Draw Gold Exit Column
            ctx.fillStyle = `rgb(${255/correctedDist*2}, ${215/correctedDist*2}, 0)`;
            ctx.fillRect(x, (canvas.height/2)-(h/2), 1, h);
        } else {
            // Draw Textured Wall
            let hitX = (player.x + eyeX * dist) % 1;
            let hitY = (player.y + eyeY * dist) % 1;
            let texX = Math.floor((Math.abs(hitX) > Math.abs(hitY) ? hitX : hitY) * texSize);
            ctx.drawImage(wallTex.canvas, texX, 0, 1, texSize, x, (canvas.height/2)-(h/2), 1, h);
            
            // Fog
            ctx.fillStyle = `rgba(0,0,0,${Math.min(1, correctedDist/15)})`;
            ctx.fillRect(x, (canvas.height/2)-(h/2), 1, h);
        }
    }
    
    // Start Point Indicator (Floor marker)
    if (Math.sqrt((player.x-1.5)**2 + (player.y-1.5)**2) < 1) {
        ctx.fillStyle = "#0f0";
        ctx.font = "20px monospace";
        ctx.fillText("START POINT", canvas.width/2 - 60, canvas.height - 50);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
initLevel();
loop();
</script>
</body>
</html>
