<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Match Pro: Levels</title>
    <style>
        :root { --bg: #2c3e50; --card: #ffffff; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: none; 
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        #canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
        .header { color: white; text-align: center; margin-bottom: 5px; z-index: 10; }
        #level-indicator { font-size: 1.2rem; opacity: 0.8; margin-bottom: 5px; }
        
        .game-board {
            display: grid;
            gap: 8px;
            width: 95vw;
            max-width: 600px;
            padding: 10px;
            transition: opacity 0.5s;
            justify-content: center;
        }

        .card {
            aspect-ratio: 1/1;
            background: var(--card);
            border: 3px solid transparent;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s, opacity 0.4s;
        }
        .card.is-selected { border-color: #ecf0f1; transform: scale(1.08); }
        .card.is-matched { opacity: 0; pointer-events: none; transform: scale(0.5); }
        .icon { width: 75%; height: 75%; }

        #victory-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            display: none;
            z-index: 200;
            width: 100%;
        }
        #victory-text {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255,255,255,0.6);
            margin-bottom: 30px;
            display: block;
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
        .btn {
            padding: 20px 40px; font-size: 1.4rem;
            background: #f1c40f; color: #2c3e50;
            border: none; border-radius: 50px;
            font-weight: bold; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="header">
        <div id="level-indicator">Level 1</div>
        <h2 id="msg">Find the Pairs!</h2>
    </div>

    <div class="game-board" id="board"></div>

    <div id="victory-overlay">
        <span id="victory-text"></span>
        <button class="btn" onclick="resetGame()">Start Over</button>
    </div>

    <script>
        // Library of 25 unique icons
        const iconLibrary = [
            { n: 'star', p: 'M256 38l68 139 154 22-111 108 26 153-137-72-137 72 26-153-111-108 154-22z', c: '#f1c40f' },
            { n: 'heart', p: 'M462 62c-55-46-136-38-186 14L256 96l-20-20C186 24 104 16 50 62c-63 54-66 150-10 208l193 200c13 13 33 13 45 0l194-200c56-58 53-154-10-208z', c: '#e74c3c' },
            { n: 'moon', p: 'M223 32C100 32 0 132 0 255s100 224 223 224c61 0 116-24 156-63 5-5 6-13 3-19s-10-10-17-9c-10 2-20 3-30 3-97 0-175-79-175-175 0-66 36-123 90-153 6-4 9-11 8-17s-7-12-14-13c-6-1-13-1-19-1z', c: '#f39c12' },
            { n: 'bolt', p: 'M0 288c0-18 14-32 32-32h144V32c0-13 8-25 20-30s26-1 35 10l192 240c11 14 11 34 0 48s-32 19-51 11L272 288v224c0 13-8 25-20 30s-26 1-35-10l-192-240C11 312 8 300 8 288H0z', c: '#2ecc71' },
            { n: 'cloud', p: 'M0 336c0 80 65 144 144 144h224c80 0 144-65 144-144 0-64-42-118-99-137 2-10 3-21 3-31 0-84-68-152-152-152-60 0-113 35-137 86-15-10-33-16-53-16-53 0-96 43-96 96 0 2 0 4 0 6C31 213 0 270 0 336z', c: '#3498db' },
            { n: 'sun', p: 'M256 160c-53 0-96 43-96 96s43 96 96 96 96-43 96-96-43-96-96-96zm0-64c18 0 32-14 32-32V32c0-18-14-32-32-32s-32 14-32 32v32c0 18 14 32 32 32zm136 45c12 13 33 13 45 0s13-33 0-45l-23-23c-12-12-33-12-45 0s-13 33 0 45l23 23zM480 224h-32c-18 0-32 14-32 32s14 32 32 32h32c18 0 32-14 32-32s-14-32-32-32z', c: '#ff9f43' },
            { n: 'bell', p: 'M256 0c-18 0-32 14-32 32v19C133 66 64 145 64 240v120c0 11-6 22-16 27L16 406c-14 8-19 26-12 40 7 15 25 21 39 14l33-15v35c0 18 14 32 32 32h304c18 0 32-14 32-32v-35l29 14c15 7 32 1 39-14 7-15 2-32-12-40l-32-18c-10-6-16-16-16-27V240c0-95-69-174-160-189V32c0-18-14-32-32-32z', c: '#9b59b6' },
            { n: 'gift', p: 'M32 160c-18 0-32 14-32 32v32c0 18 14 32 32 32h448c18 0 32-14 32-32v-32c0-18-14-32-32-32H32zm208 128H64v192c0 18 14 32 32 32h144V288zm32 0v224h144c18 0 32-14 32-32V288H272zM96 128c0-35 29-64 64-64s64 29 64 64h32c0-35 29-64 64-64s64 29 64 64h48c18 0 32-14 32-32s-14-32-32-32h-11c-6-37-38-64-77-64-32 0-60 18-74 46-14-28-42-46-74-46-39 0-71 27-77 64h-11c-18 0-32 14-32 32s14 32 32 32h48z', c: '#ff4d4d' },
            { n: 'rocket', p: 'M480 32l-47 0-46 46c-40-3-80 6-114 28l-10-10c-13-13-33-13-45 0s-13 33 0 45l10 10c-22 34-31 74-28 114l-46 46c-13 13-13 33 0 45s33 13 45 0l46-46c40 3 80-6 114-28l10 10c13 13 33 13 45 0s13-33 0-45l-10-10c22-34 31-74 28-114l46-46', c: '#00d2d3' },
            { n: 'gem', p: 'M160 32L48 224l208 256 208-256L352 32H160zM90 216l84-143h164l84 143H90z', c: '#a29bfe' },
            { n: 'bug', p: 'M256 64c-44 0-80 36-80 80v32h160v-32c0-44-36-80-80-80zM144 176c-27 0-48 21-48 48v160c0 44 36 80 80 80h160c44 0 80-36 80-80V224c0-27-21-48-48-48H144z', c: '#badc58' },
            { n: 'car', p: 'M496 304l-40-104c-12-32-42-54-76-54H132c-34 0-64 22-76 54L16 304c-10 26 9 54 37 54h11c-3 8-5 16-5 24 0 40 32 72 72 72s72-32 72-72c0-8-2-16-5-24h128c-3 8-5 16-5 24 0 40 32 72 72 72s72-32 72-72c0-8-2-16-5-24h11c28 0 47-28 37-54z', c: '#ff7675' },
            { n: 'tree', p: 'M256 32L96 224h64l-96 160h128v96h64v-96h128L320 224h64L256 32z', c: '#27ae60' },
            { n: 'ghost', p: 'M256 32c-88 0-160 72-160 160v224l32-32 32 32 32-32 32 32 32-32 32 32 32-32 32 32V192c0-88-72-160-160-160z', c: '#dfe6e9' },
            { n: 'plane', p: 'M464 224h-80l-96-160h-48l48 160h-96l-32-48h-32l16 48-16 48h32l32-48h96l-48 160h48l96-160h80c27 0 48-21 48-48s-21-48-48-48z', c: '#74b9ff' },
            { n: 'music', p: 'M470 41c-11-5-24-2-29 9l-96 224v162c0 44-36 80-80 80s-80-36-80-80 36-80 80-80c12 0 24 3 34 8l3-192c1-26 19-48 44-53l128-30c12-3 25 4 29 16s-2 25-14 29l-114 27v14l96-22c11-3 22 4 25 15s-4 22-15 25z', c: '#fd79a8' },
            { n: 'fish', p: 'M512 256c0 60-128 160-256 160S0 316 0 256 128 96 256 96s256 100 256 160z', c: '#fab1a0' },
            { n: 'bone', p: 'M448 320c-35 0-64 29-64 64 0 5-1 10-2 15L130 257c1-5 2-10 2-15 0-35-29-64-64-64S4 207 4 242s29 64 64 64c5 0 10-1 15-2l253 142c-1 5-2 10-2 15 0 35 29 64 64 64s64-29 64-64-29-64-64-64z', c: '#eee' },
            { n: 'ice', p: 'M256 32c-88 0-160 72-160 160 0 128 160 288 160 288s160-160 160-288c0-88-72-160-160-160z', c: '#81ecec' },
            { n: 'crown', p: 'M480 128l-96 96-128-160-128 160-96-96 32 256h384l32-256z', c: '#ffeaa7' },
            { n: 'pizza', p: 'M256 32L32 448h448L256 32z', c: '#e67e22' },
            { n: 'apple', p: 'M256 96c-44 0-80 36-80 80s36 80 80 80 80-36 80-80-36-80-80-80z', c: '#ff7675' },
            { n: 'key', p: 'M160 224c-35 0-64 29-64 64s29 64 64 64 64-29 64-64c0-5-1-10-2-15l162-162V32h80v80h-40v40h-40l-80 80c-5-1-10-2-15-2z', c: '#95a5a6' },
            { n: 'leaf', p: 'M480 32C320 32 32 320 32 480c160 0 448-288 448-448z', c: '#55efc4' },
            { n: 'paw', p: 'M256 192c-53 0-96 43-96 96s43 96 96 96 96-43 96-96-43-96-96-96z', c: '#a29bfe' }
        ];

        const levels = [
            { r: 4, c: 4 }, // 8 pairs
            { r: 5, c: 4 }, // 10 pairs
            { r: 6, c: 4 }, // 12 pairs
            { r: 6, c: 5 }, // 15 pairs
            { r: 6, c: 6 }  // 18 pairs
        ];

        let currentLevelIndex = 0;
        let first = null;
        let matchesFound = 0;
        let fireworksActive = false;

        function initLevel() {
            const level = levels[currentLevelIndex];
            const b = document.getElementById('board');
            const overlay = document.getElementById('victory-overlay');
            const indicator = document.getElementById('level-indicator');
            
            b.style.opacity = "1";
            b.style.gridTemplateColumns = `repeat(${level.c}, 1fr)`;
            overlay.style.display = "none";
            indicator.innerText = `Level ${currentLevelIndex + 1} (${level.r}x${level.c})`;
            fireworksActive = false;
            b.innerHTML = '';
            first = null;
            matchesFound = 0;

            // Pick random subset of icons for this level
            const numPairs = (level.r * level.c) / 2;
            let levelIcons = [...iconLibrary].sort(() => Math.random() - 0.5).slice(0, numPairs);
            let gameSet = [...levelIcons, ...levelIcons].sort(() => Math.random() - 0.5);

            gameSet.forEach(i => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.i = i.n;
                card.innerHTML = `<svg class="icon" viewBox="0 0 512 512" style="fill: ${i.c}"><path d="${i.p}"/></svg>`;
                card.onclick = () => handleTap(card);
                b.appendChild(card);
            });
        }

        function handleTap(c) {
            if (c.classList.contains('is-matched') || c === first) return;
            if (!first) { first = c; c.classList.add('is-selected'); }
            else {
                if (c.dataset.i === first.dataset.i) {
                    c.classList.add('is-matched');
                    first.classList.remove('is-selected');
                    first.classList.add('is-matched');
                    first = null;
                    matchesFound++;
                    if (matchesFound === (levels[currentLevelIndex].r * levels[currentLevelIndex].c) / 2) {
                        nextLevel();
                    }
                } else {
                    first.classList.remove('is-selected');
                    first = c;
                    c.classList.add('is-selected');
                }
            }
        }

        function nextLevel() {
            if (currentLevelIndex < levels.length - 1) {
                currentLevelIndex++;
                setTimeout(initLevel, 600); // Small pause between levels
            } else {
                triggerFinalVictory();
            }
        }

        function triggerFinalVictory() {
            const b = document.getElementById('board');
            const overlay = document.getElementById('victory-overlay');
            const txt = document.getElementById('victory-text');
            const phrases = ["MASTER!", "UNSTOPPABLE!", "PERFECT!", "YOU WON!"];
            
            b.style.opacity = "0";
            txt.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            overlay.style.display = "block";
            fireworksActive = true;
        }

        function resetGame() {
            currentLevelIndex = 0;
            initLevel();
        }

        // --- FIREWORKS ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 12, y: (Math.random() - 0.5) * 12 };
                this.alpha = 1;
                this.friction = 0.95;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += 0.1;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (fireworksActive && Math.random() < 0.1) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height * 0.5;
                const color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                for (let i = 0; i < 50; i++) particles.push(new Particle(x, y, color));
            }
            particles.forEach((p, i) => {
                if (p.alpha <= 0) particles.splice(i, 1);
                else { p.update(); p.draw(); }
            });
        }

        animate();
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
        initLevel();
    </script>
</body>
</html>
