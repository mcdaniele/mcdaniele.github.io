<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picture Match</title>
    <style>
        :root { --bg: #fcfaf2; --card: #ffffff; --blue: #3498db; --green: #2ecc71; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
        .game-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 90vw; max-width: 500px; padding: 20px; }
        .card { aspect-ratio: 1/1; background: var(--card); border: 5px solid transparent; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .card.is-selected { border-color: var(--blue); transform: scale(1.05); }
        .card.is-matched { animation: matchPulse 0.7s forwards; pointer-events: none; }
        .icon { width: 65%; height: 65%; fill: #333; }
        .card.is-matched .icon { fill: var(--green); }
        @keyframes matchPulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 0.3; } }
        .btn { margin-top: 30px; padding: 15px 30px; font-size: 1.2rem; background: #333; color: #fff; border: none; border-radius: 50px; }
    </style>
</head>
<body>
    <h1>Picture Match</h1>
    <div class="game-board" id="board"></div>
    <button class="btn" onclick="initGame()">New Game</button>

            { n: 'cloud', p: 'M0 336c0 79.5 64.5 144 144 144h224c79.5 0 144-64.5 144-144 0-63.9-41.6-118.2-99.3-137 2.1-10.1 3.3-20.6 3.3-31.4 0-83.9-68.1-152-152-152-60.3 0-112.5 35.1-137.4 86.4-15.1-10.4-33.3-16.4-53-16.4-52.8 0-95.6 42.8-95.6 95.6 0 1.9.1 3.7.2 5.5C31.5 212.5 0 269.8 0 336z' }
        ];
        let first = null;
        function initGame() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            first = null;
            let g = [...icons, ...icons].sort(() => Math.random() - 0.5);
            g.forEach(i => {
                const c = document.createElement('div');
                c.className = 'card';
                c.dataset.i = i.n;
                c.innerHTML = `<svg class="icon" viewBox="0 0 512 512"><path d="${i.p}"/></svg>`;
                c.onclick = () => {
                    if (c.classList.contains('is-matched') || c === first) return;
                    if (!first) { first = c; c.classList.add('is-selected'); }
                    else {
                        if (c.dataset.i === first.dataset.i) {
                            c.classList.add('is-matched');
                            first.classList.remove('is-selected');
                            first.classList.add('is-matched');
                            first = null;
                        } else {
                            first.classList.remove('is-selected');
                            first = c;
                            c.classList.add('is-selected');
                        }
                    }
                };
                b.appendChild(c);
            });
        }
        initGame();
    </script>
</body>
</html>
