<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Match Game">

    <title>Colorful Match</title>
    <style>
        :root { --bg: #2c3e50; --card: #ffffff; }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: none; 
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        .header { color: white; text-align: center; margin-bottom: 10px; }
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 95vw;
            max-width: 500px;
            padding: 10px;
        }
        .card {
            aspect-ratio: 1/1;
            background: var(--card);
            border: 4px solid transparent;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            transition: transform 0.2s, opacity 0.4s;
        }
        .card.is-selected { border-color: #ecf0f1; transform: scale(1.1); }
        .card.is-matched { opacity: 0; pointer-events: none; transform: scale(0.5); }
        .icon { width: 70%; height: 70%; }
        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            background: #ecf0f1;
            color: #2c3e50;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header"><h2 id="msg">Match the Colors!</h2></div>
    <div class="game-board" id="board"></div>
    <button class="btn" onclick="initGame()">Restart Game</button>

    <script>
        const icons = [
            { n: 'star', p: 'M256 38.05l68.73 139.26 153.64 22.33-111.16 108.35 26.24 153.01L256 388.92l-137.45 72.08 26.24-153.01L33.63 199.64l153.64-22.33L256 38.05z', c: '#f1c40f' },
            { n: 'heart', p: 'M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z', c: '#e74c3c' },
            { n: 'rocket', p: 'M480 32l-46.6 0-46.1 46.1c-40.1-3.1-80.1 6.3-114.2 28.1l-10.4-10.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l10.4 10.4c-21.8 34.1-31.2 74.1-28.1 114.2l-46.1 46.1c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l46.1-46.1c40.1 3.1 80.1-6.3 114.2-28.1l10.4 10.4c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-10.4-10.4c21.8-34.1 31.2-74.1 28.1-114.2l46.1-46.1z', c: '#3498db' },
            { n: 'bell', p: 'M256 0c-17.7 0-32 14.3-32 32v19.2C132.6 66 64 145.1 64 240v120c0 11.4-6.1 21.9-16 27.4L16 405.5C1.8 413.4-3.5 431.1 3.5 445.6c7 14.5 24.8 20.6 39.3 13.6L72 445V480c0 17.7 14.3 32 32 32h304c17.7 0 32-14.3 32-32v-35l29.2 14.2c14.5 7.1 32.3.9 39.3-13.6 7-14.5 1.7-32.2-12.5-40.1l-32-18.1c-9.9-5.6-16-16.1-16-27.4V240c0-94.9-68.6-174-160-188.8V32c0-17.7-14.3-32-32-32z', c: '#9b59b6' },
            { n: 'moon', p: 'M223.5 32C100 32 0 132 0 255.5S100 479 223.5 479c60.6 0 115.5-24.2 155.8-63.4 5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6-96.9 0-175.5-78.6-175.5-175.5 0-65.8 36.2-123.1 89.7-153.3 6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.1-.5-12.6-.8-19.4-.8z', c: '#f39c12' },
            { n: 'sun', p: 'M256 160c-53 0-96 43-96 96s43 96 96 96 96-43 96-96-43-96-96-96zm0-64c17.7 0 32-14.3 32-32V32c0-17.7-14.3-32-32-32s-32 14.3-32 32v32c0 17.7 14.3 32 32 32zm135.8 45.4c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-22.6-22.6c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l22.6 22.6zM480 224h-32c-17.7 0-32 14.3-32 32s14.3 32 32 32h32c17.7 0 32-14.3 32-32s-14.3-32-32-32zM391.8 346.5c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l22.6 22.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-22.6-22.6z', c: '#ff5e13' },
            { n: 'bolt', p: 'M0 288c0-17.7 14.3-32 32-32h144V32c0-13.1 8-24.8 20.1-29.7s26-.8 34.6 10l192 240c11.3 14.1 11.3 34.4 0 48.4s-32.5 19-50.6 11.4L272 288v224c0 13.1-8 24.8-20.1 29.7s-26 .8-34.6-10l-192-240C10.7 312.4 8 300.5 8 288H0z', c: '#2ecc71' },
            { n: 'cloud', p: 'M0 336c0 79.5 64.5 144 144 144h224c79.5 0 144-64.5 144-144 0-63.9-41.6-118.2-99.3-137 2.1-10.1 3.3-20.6 3.3-31.4 0-83.9-68.1-152-152-152-60.3 0-112.5 35.1-137.4 86.4-15.1-10.4-33.3-16.4-53-16.4-52.8 0-95.6 42.8-95.6 95.6 0 1.9.1 3.7.2 5.5C31.5 212.5 0 269.8 0 336z', c: '#1abc9c' }
        ];

        let first = null;
        let matchesFound = 0;

        function initGame() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            first = null;
            matchesFound = 0;
            document.getElementById('msg').innerText = "Match the Colors!";
            let g = [...icons, ...icons].sort(() => Math.random() - 0.5);
            g.forEach(i => {
                const c = document.createElement('div');
                c.className = 'card';
                c.dataset.i = i.n;
                c.innerHTML = `<svg class="icon" viewBox="0 0 512 512" style="fill: ${i.c}"><path d="${i.p}"/></svg>`;
                c.onclick = () => handleTap(c);
                b.appendChild(c);
            });
        }

        function handleTap(c) {
            if (c.classList.contains('is-matched') || c === first) return;
            if (!first) { first = c; c.classList.add('is-selected'); }
            else {
                if (c.dataset.i === first.dataset.i) {
                    c.classList.add('is-matched');
                    first.classList.remove('is-selected');
                    first.classList.add('is-matched');
                    first = null;
                    matchesFound++;
                    if (matchesFound === icons.length) document.getElementById('msg').innerText = "Great Job!";
                } else {
                    first.classList.remove('is-selected');
                    first = c;
                    c.classList.add('is-selected');
                }
            }
        }

        // Lock out zoom gestures
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
        initGame();
    </script>
</body>
</html>
