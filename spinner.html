<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Color Stop Pro</title>
    <style>
        :root { --bg: #2c3e50; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui-layer { z-index: 10; text-align: center; color: white; }
        #canvas-bg { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }
        
        #target-zone {
            width: 100px;
            height: 40px;
            margin: 0 auto 10px auto;
            border-radius: 8px;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #game-canvas {
            background: transparent;
            margin-bottom: 30px;
            z-index: 5;
        }

        .btn {
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #f1c40f;
            color: #2c3e50;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }

        #victory-text {
            position: fixed;
            top: 20%;
            font-size: 4rem;
            font-weight: 900;
            display: none;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            z-index: 100;
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div id="victory-text">WINNER!</div>

    <div id="ui-layer">
        <div id="target-label" style="margin-bottom: 5px; font-weight: bold;">MATCH THIS:</div>
        <div id="target-zone"></div>
        <canvas id="game-canvas" width="320" height="320"></canvas>
        <br>
        <button id="action-btn" class="btn" onclick="handleAction()">STOP</button>
    </div>

    <script>
        const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6', '#e67e22']; // Red, Blue, Yellow, Green, Purple, Orange
        let targetIndex = 0;
        let currentAngle = 0;
        let rotationSpeed = 0.08;
        let isSpinning = true;
        let fireworksActive = false;

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('action-btn');
        const targetZone = document.getElementById('target-zone');
        const victoryText = document.getElementById('victory-text');

        function setTarget() {
            targetIndex = Math.floor(Math.random() * colors.length);
            targetZone.style.backgroundColor = colors[targetIndex];
        }

        function drawSpinner() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 140;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 6; i++) {
                const startAngle = currentAngle + (i * Math.PI * 2) / 6;
                const endAngle = currentAngle + ((i + 1) * Math.PI * 2) / 6;

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // Central hub
            ctx.beginPath();
            ctx.arc(cx, cy, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
        }

        function update() {
            if (isSpinning) {
                currentAngle += rotationSpeed;
            }
            drawSpinner();
            requestAnimationFrame(update);
        }

        function handleAction() {
            if (isSpinning) {
                stopSpin();
            } else {
                startSpin();
            }
        }

        function stopSpin() {
            isSpinning = false;
            
            // Normalize angle to 0 - 2PI
            let normalized = currentAngle % (Math.PI * 2);
            if (normalized < 0) normalized += (Math.PI * 2);

            // In Canvas, 0 radians is East (3 o'clock). 
            // We want to know what is at North (12 o'clock), which is -PI/2.
            // Calculation to find which index is at the top:
            let topIndex = Math.floor(((Math.PI * 1.5 - normalized) % (Math.PI * 2)) / (Math.PI / 3));
            if (topIndex < 0) topIndex += 6;

            if (topIndex === targetIndex) {
                win();
            } else {
                btn.innerText = "SPIN AGAIN";
            }
        }

        function startSpin() {
            isSpinning = true;
            fireworksActive = false;
            victoryText.style.display = 'none';
            btn.innerText = "STOP";
            setTarget();
            // Speed up slightly each round to make it harder
            rotationSpeed = 0.08 + (Math.random() * 0.05);
        }

        function win() {
            victoryText.style.display = 'block';
            fireworksActive = true;
            btn.innerText = "SPIN AGAIN";
        }

        // --- FIREWORKS SYSTEM ---
        const bgCanvas = document.getElementById('canvas-bg');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];
        function resize() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 12, y: (Math.random() - 0.5) * 12 };
                this.alpha = 1; this.friction = 0.95;
            }
            update() {
                this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                this.velocity.y += 0.1; this.x += this.velocity.x; this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
            draw() {
                bgCtx.globalAlpha = this.alpha; bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                bgCtx.fillStyle = this.color; bgCtx.fill();
            }
        }

        function animateBg() {
            requestAnimationFrame(animateBg);
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            if (fireworksActive && Math.random() < 0.1) {
                const x = Math.random() * bgCanvas.width;
                const y = Math.random() * bgCanvas.height * 0.4;
                const color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                for (let i = 0; i < 50; i++) particles.push(new Particle(x, y, color));
            }
            particles.forEach((p, i) => {
                if (p.alpha <= 0) particles.splice(i, 1);
                else { p.update(); p.draw(); }
            });
        }

        setTarget();
        update();
        animateBg();
    </script>
</body>
</html>
