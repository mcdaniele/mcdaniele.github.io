<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Spinner: Top Half Win</title>
    <style>
        :root { --neon: #00bfff; }
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; touch-action: none;
        }

        /* The Goal indicator for the top half */
        #top-half-glow {
            position: absolute; width: 340px; height: 170px;
            background: rgba(0, 191, 255, 0.1);
            border: 2px solid var(--neon);
            border-bottom: none;
            border-radius: 170px 170px 0 0;
            top: calc(50% - 170px);
            z-index: 1;
            pointer-events: none;
        }

        #wheel {
            width: 320px; height: 320px;
            border-radius: 50%;
            border: 4px solid #222;
            background: conic-gradient(
                #ff0055 0deg 90deg, 
                #00ffcc 90deg 180deg, 
                #ffcc00 180deg 270deg, 
                #9d00ff 270deg 360deg
            );
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 2;
            transition: transform 3s cubic-bezier(0.2, 0, 0.2, 1);
        }

        #needle {
            position: absolute; width: 4px; height: 160px;
            background: white; top: calc(50% - 160px); left: 50%;
            transform-origin: bottom center; z-index: 3;
            box-shadow: 0 0 10px white;
        }

        #ui { margin-top: 40px; text-align: center; z-index: 4; }
        button {
            padding: 15px 40px; font-size: 20px; background: transparent;
            color: var(--neon); border: 2px solid var(--neon);
            border-radius: 30px; cursor: pointer; font-weight: bold;
        }
        #msg { margin-top: 20px; font-size: 24px; min-height: 30px; color: var(--neon); }
    </style>
</head>
<body>

    <div id="top-half-glow"></div>
    <div id="needle"></div>
    <div id="wheel"></div>

    <div id="ui">
        <button onclick="spin()">SPIN</button>
        <div id="msg">LAND IN THE GLOW!</div>
    </div>

<script>
    let rotation = 0;
    const wheel = document.getElementById('wheel');
    const msg = document.getElementById('msg');

    // Segment definitions
    const segments = [
        { name: "RED", start: 0, end: 90, color: "#ff0055" },
        { name: "TEAL", start: 90, end: 180, color: "#00ffcc" },
        { name: "YELLOW", start: 180, end: 270, color: "#ffcc00" },
        { name: "PURPLE", start: 270, end: 360, color: "#9d00ff" }
    ];

    function spin() {
        msg.innerText = "SPINNING...";
        const extra = Math.floor(Math.random() * 360) + 1800; 
        rotation += extra;
        wheel.style.transform = `rotate(${rotation}deg)`;

        setTimeout(evaluate, 3000);
    }

    function evaluate() {
        // Find the "upright" angle of the wheel
        // (360 - rotation % 360) tells us what degree is at the 12 o'clock position
        let currentPos = (360 - (rotation % 360)) % 360;

        let foundWin = false;

        segments.forEach(seg => {
            // Calculate where this segment now sits in world space
            let worldStart = (seg.start + (rotation % 360)) % 360;
            let worldEnd = (seg.end + (rotation % 360)) % 360;

            // Logic: Is the entire segment between 0 and 180?
            // Note: worldEnd < worldStart happens if it wraps around 360
            let isInsideTopHalf = false;
            
            if (worldEnd > worldStart) {
                // Standard range
                if (worldStart >= 0 && worldEnd <= 180) isInsideTopHalf = true;
            } else {
                // Wrapped range (e.g., starts at 350, ends at 80)
                // In this case, it's NOT "totally above" because part is below 0/360
                isInsideTopHalf = false;
            }

            if (isInsideTopHalf) {
                msg.innerText = `WIN! ${seg.name} IS CLEAR!`;
                msg.style.color = seg.color;
                foundWin = true;
            }
        });

        if (!foundWin) {
            msg.innerText = "TRY AGAIN!";
            msg.style.color = "#00bfff";
        }
    }
</script>
</body>
</html>
