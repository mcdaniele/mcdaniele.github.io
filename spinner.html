<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Spinner: Top Half Win</title>
    <style>
        body { background: #000; color: #00bfff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #game-container { position: relative; }

        /* The Win Zone Indicator (Top Half) */
        #win-zone {
            position: absolute;
            top: -10px; left: -10px;
            width: 320px; height: 160px; /* Half circle */
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-bottom: none;
            border-radius: 160px 160px 0 0;
            pointer-events: none;
            z-index: 10;
        }

        #wheel {
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 5px solid #00bfff;
            position: relative;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 20px #00bfff;
            background: conic-gradient(
                #ff0055 0deg 90deg, 
                #00ffcc 90deg 180deg, 
                #ffcc00 180deg 270deg, 
                #9d00ff 270deg 360deg
            );
        }

        #spin-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: transparent;
            color: #00bfff;
            border: 2px solid #00bfff;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 10px #00bfff;
        }

        #result { margin-top: 20px; font-size: 24px; height: 30px; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="win-zone"></div>
        <div id="wheel"></div>
    </div>

    <button id="spin-btn">SPIN THE WHEEL</button>
    <div id="result"></div>

<script>
    const wheel = document.getElementById('wheel');
    const btn = document.getElementById('spin-btn');
    const result = document.getElementById('result');
    
    let currentRotation = 0;

    // Define our segments (0-90 is Red, etc.)
    // Note: Since the wheel rotates clockwise, we have to account for 
    // the "top half" being the area that moves INTO that 0-180 space.
    const segments = [
        { name: "PURPLE", color: "#9d00ff", min: 0, max: 90 },
        { name: "YELLOW", color: "#ffcc00", min: 90, max: 180 },
        { name: "TEAL", color: "#00ffcc", min: 180, max: 270 },
        { name: "RED", color: "#ff0055", min: 270, max: 360 }
    ];

    btn.addEventListener('click', () => {
        result.innerText = "Spinning...";
        const extraDegrees = Math.floor(Math.random() * 360) + 1440; // At least 4 full spins
        currentRotation += extraDegrees;
        
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        // Wait for transition to finish (4s)
        setTimeout(checkWin, 4000);
    });

    function checkWin() {
        // 1. Get the actual rotation within 360 degrees
        // We use a negative because CSS 'rotate' moves clockwise, 
        // but the math for segments effectively moves counter to the pointer.
        let actualAngle = (360 - (currentRotation % 360)) % 360;

        // 2. Adjust for the "Center" of the top half (which is 90 degrees in standard math)
        // To simplify: we find which segment is at the 90-degree marker (the top center)
        let winningSegment = segments.find(s => actualAngle >= s.min && actualAngle < s.max);

        if (winningSegment) {
            result.innerText = `WINNER: ${winningSegment.name}!`;
            result.style.color = winningSegment.color;
            
            // Neon flash effect
            document.body.style.boxShadow = `inset 0 0 100px ${winningSegment.color}`;
            setTimeout(() => document.body.style.boxShadow = "none", 500);
        }
    }
</script>
</body>
</html>
