<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Match: Web Edition</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --neon: #00bfff;
            --match: #00ffcc;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* Prevents blue highlighting while dragging */
            user-select: none; 
            -webkit-user-select: none;
        }

        #game-board {
            position: relative;
            width: 800px;
            height: 500px;
            border: 2px solid #222;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
        }

        .card {
            position: absolute;
            width: 100px;
            height: 140px;
            background: #1a1a1c;
            border: 2px solid var(--neon);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: grab;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.3);
            z-index: 2;
            transition: transform 0.1s;
            touch-action: none; /* Prevents browser scrolling while dragging */
        }

        .card:active { cursor: grabbing; scale: 1.05; }

        .slot {
            position: absolute;
            width: 110px;
            height: 150px;
            border: 2px dashed #444;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #444;
            z-index: 1;
        }

        .matched {
            border-color: var(--match) !important;
            box-shadow: 0 0 20px var(--match);
            pointer-events: none;
        }

        #ui { margin-bottom: 20px; text-align: center; }
        h1 { margin: 0; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>NEON MATCH</h1>
        <p>Drag the Emoji to its Name</p>
    </div>

    <div id="game-board">
        <!-- Slots (Targets) -->
        <div class="slot" style="top:175px; left:50px;" data-match="fire">FIRE</div>
        <div class="slot" style="top:175px; left:350px;" data-match="water">WATER</div>
        <div class="slot" style="top:175px; left:650px;" data-match="bolt">BOLT</div>

        <!-- Cards (Draggables) -->
        <div class="card" id="fire" style="top:20px; left:20px;">🔥</div>
        <div class="card" id="water" style="top:20px; left:140px;">💧</div>
        <div class="card" id="bolt" style="top:20px; left:260px;">⚡</div>
    </div>

<script>
    let activeCard = null;
    let offsetX = 0;
    let offsetY = 0;

    const cards = document.querySelectorAll('.card');
    const slots = document.querySelectorAll('.slot');
    const board = document.getElementById('game-board');

    cards.forEach(card => {
        card.addEventListener('pointerdown', startDrag);
    });

    function startDrag(e) {
        activeCard = e.target;
        const rect = activeCard.getBoundingClientRect();
        
        // Calculate where inside the card the user clicked
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        activeCard.style.zIndex = 1000;
        
        // Attach move and up listeners to window so dragging is smooth 
        // even if the mouse leaves the card area
        window.addEventListener('pointermove', drag);
        window.addEventListener('pointerup', endDrag);
    }

    function drag(e) {
        if (!activeCard) return;

        const boardRect = board.getBoundingClientRect();
        
        // Calculate position relative to the board
        let x = e.clientX - boardRect.left - offsetX;
        let y = e.clientY - boardRect.top - offsetY;

        activeCard.style.left = x + 'px';
        activeCard.style.top = y + 'px';
    }

    function endDrag(e) {
        if (!activeCard) return;

        let matched = false;
        const cardRect = activeCard.getBoundingClientRect();

        slots.forEach(slot => {
            const slotRect = slot.getBoundingClientRect();
            
            // Overlap detection
            const isOverlapping = !(
                cardRect.right < slotRect.left || 
                cardRect.left > slotRect.right || 
                cardRect.bottom < slotRect.top || 
                cardRect.top > slotRect.bottom
            );

            if (isOverlapping && slot.dataset.match === activeCard.id) {
                // Snap to slot
                const boardRect = board.getBoundingClientRect();
                activeCard.style.left = (slotRect.left - boardRect.left + 5) + 'px';
                activeCard.style.top = (slotRect.top - boardRect.top + 5) + 'px';
                
                activeCard.classList.add('matched');
                slot.classList.add('matched');
                matched = true;
            }
        });

        if (!matched) {
            // Optional: return to start position logic could go here
        }

        window.removeEventListener('pointermove', drag);
        window.removeEventListener('pointerup', endDrag);
        activeCard = null;
    }
</script>
</body>
</html>
