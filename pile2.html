<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Match: Pro Web Edition</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --neon: #00bfff;
            --match: #00ffcc;
            --error: #ff0055;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }

        #game-board {
            position: relative;
            width: 800px;
            height: 500px;
            border: 2px solid #222;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .card {
            position: absolute;
            width: 100px;
            height: 140px;
            background: #1a1a1c;
            border: 2px solid var(--neon);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            cursor: grab;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 2;
            /* Transition top/left for the 'return' animation */
            transition: transform 0.1s, border-color 0.3s, box-shadow 0.3s;
            touch-action: none;
        }

        /* Smoothing the return trip */
        .returning {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:active { cursor: grabbing; scale: 1.08; }

        .slot {
            position: absolute;
            width: 110px;
            height: 150px;
            border: 2px dashed #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            letter-spacing: 2px;
            color: #444;
            transition: all 0.2s;
        }

        /* Hover effect when dragging over the right slot */
        .slot.drag-over {
            border-color: var(--neon);
            background: rgba(0, 191, 255, 0.05);
            color: var(--neon);
        }

        .matched {
            border: 2px solid var(--match) !important;
            box-shadow: 0 0 20px var(--match);
            color: var(--match) !important;
            pointer-events: none;
            z-index: 1;
        }

        #ui { margin-bottom: 30px; text-align: center; }
        h1 { margin: 0; font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        p { opacity: 0.6; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>NEON MATCH</h1>
        <p>Drop the element into its designated terminal</p>
    </div>

    <div id="game-board">
        <!-- Slots -->
        <div class="slot" style="top:250px; left:100px;" data-match="fire">FIRE</div>
        <div class="slot" style="top:250px; left:350px;" data-match="water">WATER</div>
        <div class="slot" style="top:250px; left:600px;" data-match="bolt">BOLT</div>

        <!-- Cards -->
        <div class="card" id="fire" style="top:40px; left:100px;" data-start-x="100" data-start-y="40">🔥</div>
        <div class="card" id="water" style="top:40px; left:350px;" data-start-x="350" data-start-y="40">💧</div>
        <div class="card" id="bolt" style="top:40px; left:600px;" data-start-x="600" data-start-y="40">⚡</div>
    </div>

<script>
    let activeCard = null;
    let offsetX = 0;
    let offsetY = 0;

    const cards = document.querySelectorAll('.card');
    const slots = document.querySelectorAll('.slot');
    const board = document.getElementById('game-board');

    cards.forEach(card => {
        card.addEventListener('pointerdown', startDrag);
    });

    function startDrag(e) {
        activeCard = e.target;
        activeCard.classList.remove('returning'); // Interrupt return anim if clicked
        
        const rect = activeCard.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        activeCard.style.zIndex = 1000;
        
        window.addEventListener('pointermove', drag);
        window.addEventListener('pointerup', endDrag);
    }

    function drag(e) {
        if (!activeCard) return;

        const boardRect = board.getBoundingClientRect();
        let x = e.clientX - boardRect.left - offsetX;
        let y = e.clientY - boardRect.top - offsetY;

        activeCard.style.left = x + 'px';
        activeCard.style.top = y + 'px';

        // Check for "Hover" feedback
        const cardRect = activeCard.getBoundingClientRect();
        slots.forEach(slot => {
            if (isOverlapping(cardRect, slot.getBoundingClientRect())) {
                slot.classList.add('drag-over');
            } else {
                slot.classList.remove('drag-over');
            }
        });
    }

    function endDrag(e) {
        if (!activeCard) return;

        let matched = false;
        const cardRect = activeCard.getBoundingClientRect();

        slots.forEach(slot => {
            const slotRect = slot.getBoundingClientRect();
            slot.classList.remove('drag-over');

            if (isOverlapping(cardRect, slotRect) && slot.dataset.match === activeCard.id) {
                // SUCCESS MATCH
                const boardRect = board.getBoundingClientRect();
                activeCard.style.left = (slotRect.left - boardRect.left + 5) + 'px';
                activeCard.style.top = (slotRect.top - boardRect.top + 5) + 'px';
                
                activeCard.classList.add('matched');
                slot.classList.add('matched');
                matched = true;
            }
        });

        // IF NO MATCH: Snap back to start
        if (!matched) {
            activeCard.classList.add('returning');
            activeCard.style.left = activeCard.dataset.startX + 'px';
            activeCard.style.top = activeCard.dataset.startY + 'px';
            activeCard.style.zIndex = 2;
        }

        window.removeEventListener('pointermove', drag);
        window.removeEventListener('pointerup', endDrag);
        activeCard = null;
    }

    function isOverlapping(rect1, rect2) {
        return !(rect1.right < rect2.left || 
                 rect1.left > rect2.right || 
                 rect1.bottom < rect2.top || 
                 rect1.top > rect2.bottom);
    }
</script>
</body>
</html>
