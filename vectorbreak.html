<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Break: Glitch-Free Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00bfff; font-family: 'Courier New', monospace; cursor: crosshair; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; text-shadow: 0 0 10px #00bfff; }
        .stat { margin: 0 20px; font-size: 24px; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 100; pointer-events: none; }
        #msg { font-size: 40px; margin-bottom: 20px; display: none; color: #fff; text-shadow: 0 0 20px #ff0055; }
        button { background: #000; color: #00bfff; border: 2px solid #00bfff; padding: 15px 30px; font-family: 'Courier New', monospace; font-size: 20px; cursor: pointer; display: none; transition: 0.3s; box-shadow: 0 0 15px #00bfff; pointer-events: auto; }
        button:hover { background: #00bfff; color: #000; }
    </style>
</head>
<body onmousedown="handleStart(event)">
    <div id="ui">
        <span class="stat">LEVEL: <span id="lvl">1</span></span>
        <span class="stat">SCORE: <span id="score">0</span></span>
        <span class="stat">LIVES: <span id="lives">3</span></span>
    </div>
    <div id="overlay">
        <div id="msg">LEVEL COMPLETE!</div>
        <button id="restartBtn" onclick="fullReset()">START OVER</button>
    </div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score'), livesEl = document.getElementById('lives'), lvlEl = document.getElementById('lvl'), msgEl = document.getElementById('msg'), restartBtn = document.getElementById('restartBtn');

let w, h, score = 0, lives = 3, level = 1, paused = true, gameOver = false, levelTransition = false;
let ballSpeed = 5;

const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 10 };
const paddle = { x: 0, w: 140, h: 15 };
let bricks = [];

function handleStart(e) {
    if (e.target.tagName === 'BUTTON') return;
    if (paused && !gameOver && !levelTransition) {
        paused = false;
        ball.vx = ballSpeed;
        ball.vy = -ballSpeed;
    }
}

window.onkeydown = e => { if (e.code === 'Space') handleStart(e); };

window.addEventListener('mousemove', e => {
    if (gameOver) return;
    let nextX = e.clientX - paddle.w / 2;
    if (nextX < 0) nextX = 0;
    if (nextX > w - paddle.w) nextX = w - paddle.w;
    paddle.x = nextX;
});

function createLevel(lvl) {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    ballSpeed = 4 + lvl; 
    resetBall();
    const cols = 8 + Math.min(lvl, 4), rows = 2 + lvl;
    const padding = 10, offsetTop = 100, offsetLeft = 60;
    const bW = (w - (offsetLeft * 2)) / cols - padding, bH = 25;
    bricks = [];
    for(let r = 0; r < rows; r++) {
        for(let c = 0; c < cols; c++) {
            bricks.push({ x: offsetLeft + c * (bW + padding), y: offsetTop + r * (bH + padding), w: bW, h: bH, active: true, color: `hsl(${(lvl * 40) + (r * 15)}, 100%, 50%)` });
        }
    }
}

function resetBall() { ball.y = h - 70; ball.vx = 0; ball.vy = 0; paused = true; }

function fullReset() {
    score = 0; lives = 3; level = 1; gameOver = false;
    scoreEl.innerText = score; livesEl.innerText = lives; lvlEl.innerText = level;
    restartBtn.style.display = 'none'; msgEl.style.display = 'none';
    createLevel(level);
}

function nextLevel() {
    level++;
    lvlEl.innerText = level;
    msgEl.innerText = "LEVEL COMPLETE!";
    msgEl.style.display = 'block';
    paused = true; levelTransition = true;
    setTimeout(() => { msgEl.style.display = 'none'; levelTransition = false; createLevel(level); }, 1800);
}

function update() {
    if (gameOver) return;
    if (paused) { if (!levelTransition) ball.x = paddle.x + paddle.w / 2; return; }

    ball.x += ball.vx;
    ball.y += ball.vy;

    // Side Wall Bounces
    if (ball.x + ball.r > w) {
        ball.x = w - ball.r; // Snap inside
        ball.vx *= -1;
    }
    if (ball.x - ball.r < 0) {
        ball.x = ball.r; // Snap inside
        ball.vx *= -1;
    }
    
    // Top Wall Bounce
    if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy *= -1;
    }

    // FIXED Paddle Hit with Position Snapping
    if (ball.y + ball.r > h - 40 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
        // Correct Y to prevent sticking in the corner
        ball.y = h - 40 - ball.r;
        ball.vy = -Math.abs(ball.vy);
        
        let diff = ball.x - (paddle.x + paddle.w / 2);
        let newVx = diff * 0.15;
        if (Math.abs(newVx) < 2) newVx = newVx < 0 ? -2 : 2;
        ball.vx = newVx;
    }

    let activeBricks = 0;
    bricks.forEach(b => {
        if (!b.active) return;
        activeBricks++;
        let cx = Math.max(b.x, Math.min(ball.x, b.x + b.w));
        let cy = Math.max(b.y, Math.min(ball.y, b.y + b.h));
        let dist = Math.hypot(ball.x - cx, ball.y - cy);
        if (dist < ball.r) {
            b.active = false;
            score += 10 * level;
            scoreEl.innerText = score;
            // Determine bounce side
            if (ball.x < b.x || ball.x > b.x + b.w) ball.vx *= -1;
            else ball.vy *= -1;
        }
    });

    if (activeBricks === 0 && bricks.length > 0) nextLevel();
    if (ball.y > h) {
        lives--;
        livesEl.innerText = lives;
        if (lives <= 0) { gameOver = true; msgEl.innerText = "GAME OVER"; msgEl.style.display = 'block'; restartBtn.style.display = 'inline-block'; }
        else resetBall();
    }
}

function draw() {
    ctx.fillStyle = 'rgba(0, 8, 20, 0.4)';
    ctx.fillRect(0, 0, w, h);
    bricks.forEach(b => {
        if (!b.active) return;
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 2;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
    });
    ctx.strokeStyle = '#00ffcc';
    ctx.lineWidth = 3;
    ctx.strokeRect(paddle.x, h - 40, paddle.w, paddle.h);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, 7);
    ctx.fill();
    if (paused && !levelTransition && !gameOver) {
        ctx.fillStyle = '#00bfff';
        ctx.textAlign = 'center';
        ctx.font = '24px Courier New';
        ctx.fillText('CLICK ANYWHERE TO LAUNCH', w/2, h/2);
    }
    update();
    requestAnimationFrame(draw);
}

window.onresize = () => createLevel(level);
createLevel(level);
draw();
</script>
</body>
</html>
