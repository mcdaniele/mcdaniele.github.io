<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Break</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00bfff; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; text-shadow: 0 0 10px #00bfff; }
        .stat { margin: 0 20px; font-size: 24px; }
    </style>
</head>
<body>
    <div id="ui">
        <span class="stat">SCORE: <span id="score">0</span></span>
        <span class="stat">LIVES: <span id="lives">3</span></span>
    </div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let w, h, score = 0, lives = 3, paused = true;

// Game Objects
const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 10 };
const paddle = { x: 0, w: 120, h: 15 };
let bricks = [];

const keys = {};
window.onkeydown = e => { 
    keys[e.code] = true; 
    if(paused && e.code === 'Space') { 
        paused = false; 
        ball.vx = 5; ball.vy = -5; 
    }
};
window.onkeyup = e => keys[e.code] = false;

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    
    paddle.x = w / 2 - paddle.w / 2;
    resetBall();
    
    // Generate Brick Grid
    const cols = 10, rows = 5;
    const padding = 10, offsetTop = 80, offsetLeft = 50;
    const bW = (w - (offsetLeft * 2)) / cols - padding;
    const bH = 30;

    bricks = [];
    for(let r = 0; r < rows; r++) {
        for(let c = 0; c < cols; c++) {
            bricks.push({
                x: offsetLeft + c * (bW + padding),
                y: offsetTop + r * (bH + padding),
                w: bW, h: bH,
                active: true,
                color: `hsl(${200 + (r * 20)}, 100%, 50%)`
            });
        }
    }
}

function resetBall() {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = h - 60;
    ball.vx = 0; ball.vy = 0;
    paused = true;
}

function update() {
    if (paused) {
        ball.x = paddle.x + paddle.w / 2;
        return;
    }

    // Move Paddle
    if (keys.ArrowLeft && paddle.x > 0) paddle.x -= 8;
    if (keys.ArrowRight && paddle.x < w - paddle.w) paddle.x += 8;

    // Move Ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall Bounces
    if (ball.x + ball.r > w || ball.x - ball.r < 0) ball.vx *= -1;
    if (ball.y - ball.r < 0) ball.vy *= -1;

    // Paddle Collision
    if (ball.y + ball.r > h - 40 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
        ball.vy = -Math.abs(ball.vy);
        // Add "spin" based on where it hits the paddle
        let diff = ball.x - (paddle.x + paddle.w / 2);
        ball.vx = diff * 0.15;
    }

    // Brick Collision
    bricks.forEach(b => {
        if (!b.active) return;

        // Find closest point on brick to ball
        let closestX = Math.max(b.x, Math.min(ball.x, b.x + b.w));
        let closestY = Math.max(b.y, Math.min(ball.y, b.y + b.h));
        
        let dist = Math.hypot(ball.x - closestX, ball.y - closestY);

        if (dist < ball.r) {
            b.active = false;
            score += 10;
            document.getElementById('score').innerText = score;

            // Determine flip axis
            if (ball.x < b.x || ball.x > b.x + b.w) ball.vx *= -1;
            else ball.vy *= -1;
        }
    });

    // Death
    if (ball.y > h) {
        lives--;
        document.getElementById('lives').innerText = lives;
        if (lives <= 0) {
            alert("GAME OVER. Final Score: " + score);
            score = 0; lives = 3;
            init();
        } else {
            resetBall();
        }
    }
}

function draw() {
    // Clear with slight trail
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, w, h);

    // Draw Bricks
    bricks.forEach(b => {
        if (!b.active) return;
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 2;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        // Interior glow
        ctx.fillStyle = b.color.replace('50%', '10%');
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    // Draw Paddle
    ctx.strokeStyle = '#ff0055';
    ctx.lineWidth = 4;
    ctx.strokeRect(paddle.x, h - 40, paddle.w, paddle.h);

    // Draw Ball
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    // Ball Glow
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#fff';

    if (paused) {
        ctx.fillStyle = '#00bfff';
        ctx.font = '20px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('PRESS SPACE TO START', w/2, h/2 + 50);
    }

    update();
    requestAnimationFrame(draw);
}

window.onresize = init;
init();
draw();
</script>
</body>
</html>
