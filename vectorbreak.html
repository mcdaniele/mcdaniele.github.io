<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Break: Pre-Launch Move</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #00bfff; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; text-shadow: 0 0 10px #00bfff; }
        .stat { margin: 0 20px; font-size: 24px; }
        
        #overlay { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            z-index: 100;
        }
        #msg { font-size: 40px; margin-bottom: 20px; display: none; }
        
        button {
            background: transparent;
            color: #00bfff;
            border: 2px solid #00bfff;
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            cursor: pointer;
            display: none;
            transition: 0.3s;
            box-shadow: 0 0 15px #00bfff;
        }
        button:hover { background: #00bfff; color: #000; }
    </style>
</head>
<body>
    <div id="ui">
        <span class="stat">LEVEL: <span id="lvl">1</span></span>
        <span class="stat">SCORE: <span id="score">0</span></span>
        <span class="stat">LIVES: <span id="lives">3</span></span>
    </div>

    <div id="overlay">
        <div id="msg">LEVEL COMPLETE!</div>
        <button id="restartBtn" onclick="fullReset()">START OVER</button>
    </div>

    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score'), 
      livesEl = document.getElementById('lives'), 
      lvlEl = document.getElementById('lvl'), 
      msgEl = document.getElementById('msg'),
      restartBtn = document.getElementById('restartBtn');

let w, h, score = 0, lives = 3, level = 1, paused = true, gameOver = false;
let ballSpeed = 5;

const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 10 };
const paddle = { x: 0, w: 140, h: 15 };
let bricks = [];

const keys = {};
window.onkeydown = e => { 
    keys[e.code] = true; 
    if(paused && e.code === 'Space' && !gameOver) { 
        paused = false; 
        ball.vx = ballSpeed; ball.vy = -ballSpeed; 
    }
};
window.onkeyup = e => keys[e.code] = false;

function createLevel(lvl) {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    paddle.x = w / 2 - paddle.w / 2;
    ballSpeed = 4 + lvl; 
    resetBall();
    
    const cols = 8 + Math.min(lvl, 4);
    const rows = 2 + lvl;
    const padding = 10, offsetTop = 100, offsetLeft = 60;
    const bW = (w - (offsetLeft * 2)) / cols - padding;
    const bH = 25;

    bricks = [];
    for(let r = 0; r < rows; r++) {
        for(let c = 0; c < cols; c++) {
            bricks.push({
                x: offsetLeft + c * (bW + padding),
                y: offsetTop + r * (bH + padding),
                w: bW, h: bH,
                active: true,
                color: `hsl(${(lvl * 40) + (r * 15)}, 100%, 50%)`
            });
        }
    }
}

function resetBall() {
    ball.y = h - 70;
    ball.vx = 0; ball.vy = 0;
    paused = true;
}

function fullReset() {
    score = 0; lives = 3; level = 1; gameOver = false;
    scoreEl.innerText = score; livesEl.innerText = lives; lvlEl.innerText = level;
    restartBtn.style.display = 'none'; msgEl.style.display = 'none';
    createLevel(level);
}

function nextLevel() {
    level++;
    lvlEl.innerText = level;
    msgEl.innerText = "LEVEL COMPLETE!";
    msgEl.style.display = 'block';
    paused = true;
    setTimeout(() => {
        msgEl.style.display = 'none';
        createLevel(level);
    }, 2000);
}

function update() {
    if (gameOver) return;

    // --- PADDLE MOVEMENT (Now works even when paused) ---
    if (keys.ArrowLeft && paddle.x > 0) paddle.x -= 10;
    if (keys.ArrowRight && paddle.x < w - paddle.w) paddle.x += 10;

    // If paused, keep ball locked to paddle center
    if (paused) {
        if (msgEl.style.display === 'none') {
            ball.x = paddle.x + paddle.w / 2;
        }
        return;
    }

    // --- BALL PHYSICS (Only runs when NOT paused) ---
    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.x + ball.r > w || ball.x - ball.r < 0) ball.vx *= -1;
    if (ball.y - ball.r < 0) ball.vy *= -1;

    if (ball.y + ball.r > h - 40 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
        ball.vy = -Math.abs(ball.vy);
        let diff = ball.x - (paddle.x + paddle.w / 2);
        ball.vx = diff * 0.15;
    }

    let activeBricks = 0;
    bricks.forEach(b => {
        if (!b.active) return;
        activeBricks++;
        let cx = Math.max(b.x, Math.min(ball.x, b.x + b.w));
        let cy = Math.max(b.y, Math.min(ball.y, b.y + b.h));
        let dist = Math.hypot(ball.x - cx, ball.y - cy);
        if (dist < ball.r) {
            b.active = false;
            score += 10 * level;
            scoreEl.innerText = score;
            if (ball.x < b.x || ball.x > b.x + b.w) ball.vx *= -1;
            else ball.vy *= -1;
        }
    });

    if (activeBricks === 0) nextLevel();

    if (ball.y > h) {
        lives--;
        livesEl.innerText = lives;
        if (lives <= 0) {
            gameOver = true;
            msgEl.innerText = "GAME OVER";
            msgEl.style.display = 'block';
            restartBtn.style.display = 'inline-block';
        } else {
            resetBall();
        }
    }
}

function draw() {
    ctx.fillStyle = 'rgba(0, 8, 20, 0.4)';
    ctx.fillRect(0, 0, w, h);

    bricks.forEach(b => {
        if (!b.active) return;
        ctx.strokeStyle = b.color;
        ctx.strokeRect(b.x, b.y, b.w, b.h);
    });

    ctx.strokeStyle = '#00ffcc';
    ctx.lineWidth = 3;
    ctx.strokeRect(paddle.x, h - 40, paddle.w, paddle.h);

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, 7);
    ctx.fill();

    if (paused && msgEl.style.display === 'none' && !gameOver) {
        ctx.fillStyle = '#00bfff';
        ctx.textAlign = 'center';
        ctx.font = '24px Courier New';
        ctx.fillText('ARROWS TO AIM | SPACE TO LAUNCH', w/2, h/2);
    }

    update();
    requestAnimationFrame(draw);
}

window.onresize = () => createLevel(level);
createLevel(level);
draw();
</script>
</body>
</html>
